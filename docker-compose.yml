version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orenda_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://orenda:orenda@orenda_database:5432/orendaa?sslmode=disable
    networks:
      - orenda_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orenda_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      - NEXT_PUBLIC_API_URL=https://api.orendaa.shop
    depends_on:
      - backend
    networks:
      - orenda_network

networks:
  orenda_network:
    driver: bridge
